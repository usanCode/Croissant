
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./src/style.css">
    <title>Contact</title>
</head>
<body>
    <nav>
        <a href="./index.html">Home</a>
        <a href="./photo.html">Photos</a>
    </nav>

    <h1><u>Contact Us</u></h1>
    <p class="intro">If you have any questions or would like to learn more about our croissants, feel free to reach out!</p>

    <form action="#" method="post" class="form-croissant">
        <div class="labels">
        <label for="name">Name:</label>
            </div>
            <div class="rightTab">
        <input type="text" id="name" name="name" placeholder="Write your name here" required>
</div>
        <div class="labels">
        <label for="email">Email:</label>
            </div>

            <div class="rightTab">
        <input type="email" id="email" name="email" placeholder="Write your email address" required>
</div>

        <div class="labels">
        <label for="message">Message:</label>
            </div>

        <div class="labelMessage">    
        <textarea id="message" name="message" rows="15" placeholder="Write your message here..." required></textarea>
</div>
        <div class="submitButton">

        <button type="submit">Send Message</button>
</div>

    </form>

</body>
</html>
